name: phamory
description: Phamory - Pharmacy Stock App UI (Auth-ready, Supabase-ready)
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI
  google_fonts: ^6.2.1

  # Supabase-ready
  supabase_flutter: ^2.8.0

  # env
  flutter_dotenv: ^5.2.0

  # Calendar
  table_calendar: ^3.1.2

  # ✅ Pick image for logo upload
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
    - .env